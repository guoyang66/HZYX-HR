# 开发环境 - 只启动基础设施服务
# 后端和前端本地启动，方便调试

services:
  # PostgreSQL 数据库（带 pgvector 扩展）
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hzyxhr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: smarthr
      POSTGRES_PASSWORD: smarthr123
      POSTGRES_DB: smarthr
    ports:
      - "15432:5432" # 映射到 15432 避免与本地 PostgreSQL 冲突
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./postgres/init-positions.sql:/docker-entrypoint-initdb.d/02-init-positions.sql
    networks:
      - hzyxhr-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smarthr -d smarthr"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: hzyxhr-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hzyxhr-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Neo4j 图数据库
  neo4j:
    image: neo4j:5-community
    container_name: hzyxhr-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/neo4j123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474" # HTTP 浏览器界面
      - "7687:7687" # Bolt 协议
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j/init.cypher:/var/lib/neo4j/import/init.cypher
      - ./neo4j/init-skills-extended.cypher:/var/lib/neo4j/import/init-skills-extended.cypher
    networks:
      - hzyxhr-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Milvus 依赖 - etcd
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: hzyxhr-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - hzyxhr-network
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Milvus 依赖 - MinIO
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: hzyxhr-minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001" # MinIO 控制台
      - "9000:9000" # MinIO API
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    networks:
      - hzyxhr-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Milvus 向量数据库
  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: hzyxhr-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530" # Milvus gRPC
      - "9091:9091" # Milvus 健康检查
    depends_on:
      - etcd
      - minio
    networks:
      - hzyxhr-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Milvus Web UI (Attu)
  attu:
    image: zilliz/attu:latest
    container_name: hzyxhr-attu
    restart: unless-stopped
    environment:
      MILVUS_URL: http://milvus:19530
    ports:
      - "3300:3000"
    depends_on:
      - milvus
    networks:
      - hzyxhr-network

  # 题库种子 - 连接 Milvus 写入示例题目（运行一次）
  question-seeder:
    image: python:3.11-slim
    container_name: hzyxhr-question-seeder
    depends_on:
      milvus:
        condition: service_healthy
    networks:
      - hzyxhr-network
    environment:
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      COLLECTION_NAME: smart_hr_questions
    volumes:
      - ./seed_questions.py:/app/seed_questions.py:ro
    command: >
      sh -c "pip install --no-cache-dir marshmallow==3.21.1 &&
             pip install --no-cache-dir pymilvus==2.4.0 &&
             python /app/seed_questions.py"
    restart: "no"

networks:
  hzyxhr-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  etcd_data:
  minio_data:
  milvus_data:
